services:
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    # Remova a linha ports em produção se o Mongo só for acessível pela rede interna do compose
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: LightcodeRegistration
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Mongo__ConnectionString: mongodb://mongo:27017
      Mongo__MasterDatabaseName: SaasMasterDb
      # Gere um segredo forte na VPS; mínimo 32 caracteres
      Jwt__SigningKey: "${JWT_SIGNING_KEY:-CHANGE_ME_USE_ENV_IN_PROD_MIN_32_CHARS!!}"
      Master__ProvisioningApiKey: "${MASTER_PROVISIONING_KEY:-}"

  email-api:
    build:
      context: .
      dockerfile: Dockerfile.EmailApi
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Mongo__ConnectionString: mongodb://mongo:27017
      Mongo__MasterDatabaseName: SaasMasterDb
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__UserName: guest
      RabbitMQ__Password: guest
      Jwt__SigningKey: "${JWT_SIGNING_KEY:-CHANGE_ME_USE_ENV_IN_PROD_MIN_32_CHARS!!}"
      Master__ProvisioningApiKey: "${MASTER_PROVISIONING_KEY:-}"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DOTNET_ENVIRONMENT: Production
      Mongo__ConnectionString: mongodb://mongo:27017
      Mongo__MasterDatabaseName: SaasMasterDb
      Jwt__SigningKey: "${JWT_SIGNING_KEY:-CHANGE_ME_USE_ENV_IN_PROD_MIN_32_CHARS!!}"
      Master__ProvisioningApiKey: "${MASTER_PROVISIONING_KEY:-}"
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__UserName: guest
      RabbitMQ__Password: guest
      RabbitMQ__ScanIntervalMinutes: "60"
      Smtp__UseSmtp: "false"

volumes:
  mongo_data:
