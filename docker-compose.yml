services:
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    # Remova a linha ports em produção se o Mongo só for acessível pela rede interna do compose
    environment:
      MONGO_INITDB_DATABASE: LightcodeRegistration
    ports:
      - "27017:27017"
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 15s
      retries: 5
      start_period: 60s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RabbitMQ__UserName:-guest}
      RABBITMQ_DEFAULT_PASS: ${RabbitMQ__Password:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 30s
      retries: 10
      start_period: 90s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - ${REGISTRATION_ENV_FILE:-./.env}
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

  email-api:
    build:
      context: .
      dockerfile: Dockerfile.EmailApi
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8081:8080"
    env_file:
      - ${REGISTRATION_ENV_FILE:-./.env}
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - ${REGISTRATION_ENV_FILE:-./.env}
    environment:
      DOTNET_ENVIRONMENT: Production

volumes:
  mongo_data:
