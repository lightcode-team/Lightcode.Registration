name: Deploy VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-vps-master
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 120s
          command_timeout: 20m
          script_stop: true
          script: |
            set -e
            cd /root/lightcode-git
            git config --global --add safe.directory /root/lightcode-git
            git fetch --all --prune
            git checkout master
            git pull --ff-only origin master
            docker compose up -d --build
            docker compose ps
